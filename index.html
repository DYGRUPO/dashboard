<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DYGRUPO SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* CSS remains the same as previously established to maintain your 3D design */
        :root { --dy-red: #d61c1c; --dy-gold: #c5a059; --dy-dark-crimson: #9e0e0e; }
        body { font-family: sans-serif; background: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-box { max-width: 420px; width: 90%; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 2px solid var(--dy-gold); text-align: center; }
        .btn-primary { width: 100%; background: linear-gradient(to bottom, var(--dy-red), var(--dy-dark-crimson)); color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-container" class="auth-box">
        <div class="brand-title">DYGRUPO</div>
        <form id="login-form">
            <input type="text" id="username" placeholder="Operator ID" style="width:100%; padding:10px; margin-bottom:10px;" required>
            <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:20px;" required>
            <button type="submit" class="btn-primary">Login</button>
        </form>
        <div id="debug-log" style="font-size:10px; margin-top:10px; color:red;"></div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const log = document.getElementById('debug-log');
            
            // Basic authentication simulation
            if (user === "admin" || user === "staff") {
                alert("Login successful. Redirecting to dashboard...");
                window.location.reload(); 
            } else {
                log.innerText = "Error: Invalid credentials or database unreachable.";
            }
        });
    </script>
</body>
</html>
