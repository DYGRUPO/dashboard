<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DYGRUPO DATA SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --dy-red: #d61c1c; --dy-gold: #c5a059; --dark-neutral: #1a1919; }
        body { background-color: #f3f4f6; font-family: sans-serif; margin: 0; }
        
        /* Login Wrapper - Ensures it shows up first */
        #login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-box { width: 400px; background: white; padding: 40px; border-radius: 20px; border: 2px solid var(--dy-gold); text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .btn-primary { width: 100%; background: var(--dy-red); color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* Dashboard Layout */
        #app-container { display: none; }
        .app-header { background: var(--dark-neutral); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .content-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #2b2a2a; color: white; padding: 12px; font-size: 13px; }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; font-size: 13px; }
    </style>
</head>
<body>

<!-- Login Section -->
<div id="login-container">
    <div class="auth-box">
        <img src="DY 2606 logo.png.png" style="height:70px; margin-bottom:15px;">
        <h2>DYGRUPO</h2>
        <input type="text" id="username" placeholder="Operator ID" style="width:100%; padding:10px; margin:10px 0;">
        <input type="password" id="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px;">
        <button class="btn-primary" onclick="login()">Login</button>
    </div>
</div>

<!-- Dashboard Section -->
<div id="app-container">
    <header class="app-header">
        <div>DYGRUPO DATA</div>
        <div>
            <span id="user-display"></span> | 
            <button onclick="location.reload()">Secure Exit</button>
        </div>
    </header>
    <div class="content-grid">
        <div class="card">
            <h3>Data Upload</h3>
            <input type="file" id="excel-file" onchange="processFile(event)">
        </div>
        <div class="card">
            <h3>Query Output Grid</h3>
            <table id="metrics-table">
                <thead>
                    <tr><th>Agent ID</th><th>Account</th><th>AVD Fee</th><th>Depositor</th><th>Recharge</th><th>Withdraw</th><th>Platform</th></tr>
                </thead>
                <tbody id="metrics-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function login() {
        const user = document.getElementById('username').value;
        if(user === "admin" || user === "staff") {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('user-display').innerText = "System Admin: " + user;
        } else { alert("Invalid credentials"); }
    }

    function processFile(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheetName = workbook.SheetNames[0];
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
            const tbody = document.getElementById('metrics-tbody');
            tbody.innerHTML = '';
            rows.forEach(row => {
                tbody.innerHTML += `<tr><td>${row['代理ID']||''}</td><td>${row['代理账号']||''}</td><td>${row['个人修正']||''}</td><td>${row['储户']||''}</td><td>${row['充值']||''}</td><td>${row['提现']||''}</td><td>${row['平台']||''}</td></tr>`;
            });
        };
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
