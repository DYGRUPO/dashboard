<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WWW.DYGRUPO.COM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

:root{
--dy-red:#d61c1c;
--dy-gold:#c5a059;
--dark:#1b1b1b;
}

body{
margin:0;
font-family:Arial;
background:#f3f3f3;
background-size:cover;
}

#login-container{

display:flex;
justify-content:center;
align-items:center;
height:100vh;

background:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600');
background-size:cover;
}

.auth-box{

background:white;
width:420px;
padding:30px;
border-radius:20px;
text-align:center;
}

.auth-box input{

width:95%;
padding:12px;
margin:10px;
}

.btn{

background:var(--dy-red);
color:white;
padding:12px;
border:none;
width:100%;
cursor:pointer;
border-radius:8px;

}

#app-container{

display:none;

}

.app-header{

background:var(--dark);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;

}

.logo-area{

display:flex;
align-items:center;
gap:10px;

}

.logo-area img{

height:50px;

}

.content{

display:grid;
grid-template-columns:320px auto;
gap:20px;
padding:20px;

}

.card{

background:white;
padding:20px;
border-radius:10px;

}

.search{

padding:10px;
width:100%;

}

.tableWrap{

overflow:auto;
max-height:650px;

}

thead th{

position:sticky;
top:0;
background:#222;
color:white;
z-index:10;

}

table{

width:100%;
border-collapse:collapse;

}

th,td{

padding:10px;
border:1px solid #ddd;
font-size:13px;
text-align:center;

}

</style>
</head>

<body>

<div id="login-container">

<div class="auth-box">

<img src="DY 2606 logo.png" height="80">

<h2>DYGRUPO Dashboard</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

</div>

</div>


<div id="app-container">

<header class="app-header">

<div class="logo-area">

<img src="DY 2606 logo.png">

<img src="WG-LoGo.png">

<div>

<b>DYGRUPO Dashboard</b>

</div>

</div>

<div>

Online Members:1 |
<span id="user-display"></span>

<button onclick="logout()">Logout</button>

</div>

</header>

<div class="content">

<div>

<div class="card">

<h3>ID 搜索 Search:Agent ID 🔍</h3>

<input class="search" id="searchInput" onkeyup="searchAgent()" placeholder="Search Agent ID">

</div>

<br>

<div class="card">

<h3>导入数据 Data Sync</h3>

<input type="file" onchange="processFile(event)">

</div>

<br>

<div class="card">

<h3>账号配置管理</h3>

Create User Function Ready

</div>

</div>

<div class="card">

<h3>代理数据 DATA RESULT 📈</h3>

<div class="tableWrap">

<table>

<thead>

<tr>

<th>代理ID</th>
<th>代理账号</th>
<th>个人修正补单</th>
<th>储户</th>
<th>充值</th>
<th>提现</th>
<th>直属有效投注</th>
<th>平均值</th>
<th>盈利</th>
<th>打码</th>
<th>平台</th>

</tr>

</thead>

<tbody id="metrics-tbody">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script>

let users={

admin:"123456",
staff:"123456"

}

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(users[user]===pass){

document.getElementById("login-container").style.display="none";

document.getElementById("app-container").style.display="block";

document.getElementById("user-display").innerText=user;

}else{

alert("Wrong login");

}

}


function logout(){

location.reload()

}


function processFile(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(e){

let workbook=XLSX.read(e.target.result,{type:'binary'});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let rows=XLSX.utils.sheet_to_json(sheet);

let tbody=document.getElementById("metrics-tbody");

tbody.innerHTML='';

rows.forEach(r=>{

tbody.innerHTML+=`

<tr>

<td>${r['代理ID']||''}</td>
<td>${r['代理账号']||''}</td>
<td>${r['个人修正补单']||''}</td>
<td>${r['储户']||''}</td>
<td>${r['直属充值金额']||''}</td>
<td>${r['直属提现金额']||''}</td>
<td>${r['直属有效投注']||''}</td>
<td>${r['平均值']||''}</td>
<td>${r['盈利']||''}</td>
<td>${r['打码']||''}</td>
<td>${r['平台']||''}</td>

</tr>

`;

});

}

reader.readAsBinaryString(file);

}


function searchAgent(){

let input=document.getElementById("searchInput").value.toLowerCase();

let rows=document.querySelectorAll("#metrics-tbody tr");

rows.forEach(r=>{

let txt=r.innerText.toLowerCase();

r.style.display=txt.includes(input)?"":"none";

})

}

</script>

</body>
</html>
